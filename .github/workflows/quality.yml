name: Quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Lighthouse CI ───────────────────────────────────────────────────────────
  # Disabled. The previous job waited for a Netlify deploy preview via the
  # GitHub Deployments API, but Netlify's GitHub integration now publishes
  # checks/statuses (zero deployments on the repo), so the wait timed out
  # on every PR. Production has been on Cloudflare Pages since SUR-254 cut
  # over (2026-04-27); the Netlify previews that still build off the
  # dashboard config are dead weight.
  #
  # TODO: replace with a Cloudflare Pages preview waiter. Tracking ticket
  # to follow up SUR-254's cleanup steps 16–19.

  # ── Link check on the built site ────────────────────────────────────────────
  # Runs on every PR and every push to main. Blocking: a broken link is
  # almost always a mistake, and the ignore file is the escape hatch.
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          # --root-dir resolves absolute hrefs (e.g. "/waitlist") against
          # the built site root. lychee requires an absolute path here,
          # so we use github.workspace. (--base is for URL roots only;
          # using it with a relative local path raises "Base must either
          # be a URL (with scheme) or an absolute local path".)
          #
          # Minimal flag list: lychee v0.23+ excludes mailto:/tel: by
          # default so no --exclude-mail is needed.
          args: >-
            --no-progress
            --timeout 20
            --max-redirects 5
            --root-dir ${{ github.workspace }}/dist
            './dist/**/*.html'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
