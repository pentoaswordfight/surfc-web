# Netlify configuration for surfc.app (marketing site)
# See https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command     = "npm run build"
  publish     = "dist"

[build.environment]
  NODE_VERSION = "22"

# Force HTTPS + canonicalise www → apex. Netlify handles the apex domain
# automatically when surfc.app is set as primary in the dashboard; the rule
# below is a belt-and-suspenders redirect for any edge-case www.surfc.app hit.
[[redirects]]
  from   = "https://www.surfc.app/*"
  to     = "https://surfc.app/:splat"
  status = 301
  force  = true

# Long-lived cache for hashed assets produced by Astro.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# TODO(SUR-227): Lighthouse "uses-long-cache-ttl" flagged the static
# assets in /public — favicon, og-image, icon-*.png, robots.txt — as
# missing efficient cache headers (5–9 audits per page). They're served
# with Netlify's default short TTL. Add header rules for /favicon.ico,
# /og-image.png, /icon-*.png; pick a max-age that balances cache hit
# rate against rotation latency (1y for icons + og-image which are
# stable, 1d for robots.txt which we may iterate on).
